{% extends "base.html" %}

{% block announce %}
{% if config.extra.beta_banner %}
<aside class="md-banner md-typeset" id="eolas-beta-banner" role="status">
  <strong>Beta</strong> · {{ config.extra.beta_banner_message }}
  <a href="https://eolas.fyi">Explore eolas.fyi</a>
</aside>
{% endif %}
{% endblock %}

{% block extrahead %}
  {{ super() }}
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="eolas docs" />
  <meta property="og:title" content="{{ page.title | striptags }} — eolas" />
  <meta property="og:description" content="{{ config.site_description }}" />
  <meta property="og:url" content="{{ page.canonical_url }}" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="{{ page.title | striptags }} — eolas" />
  <meta name="twitter:description" content="{{ config.site_description }}" />
{% endblock %}
